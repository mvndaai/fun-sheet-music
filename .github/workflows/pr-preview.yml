name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-preview-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  # ── Deploy PR preview ───────────────────────────────────────────────────────
  deploy-preview:
    name: "Deploy: PR Preview"
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    env:
      PR_PATH: pr/${{ github.event.number }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.PUB_CACHE }}
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Build web for PR preview
        run: >
          flutter build web --release
          --base-href /${{ github.event.repository.name }}/${{ env.PR_PATH }}/

      - name: Deploy PR preview to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          target-folder: ${{ env.PR_PATH }}
          clean: true

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl =
              `https://${{ github.repository_owner }}.github.io` +
              `/${{ github.event.repository.name }}/${{ env.PR_PATH }}/`;
            const marker = '<!-- pr-preview-comment -->';
            const body = `${marker}\n🚀 **PR Preview deployed:** ${previewUrl}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # ── Remove PR preview on close / merge ─────────────────────────────────────
  remove-preview:
    name: "Remove: PR Preview"
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    env:
      PR_PATH: pr/${{ github.event.number }}
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Remove PR preview directory
        run: |
          if [ -d "$PR_PATH" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git rm -rf "$PR_PATH"
            git commit -m "chore: remove PR #${{ github.event.number }} preview"
            git push
          else
            echo "Preview directory $PR_PATH not found, nothing to remove."
          fi
