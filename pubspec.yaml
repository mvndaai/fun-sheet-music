name: fun_sheet_music
description: An app for displaying colored sheet music with practice modes.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # XML parsing for MusicXML files
  xml: ^6.5.0

  # File picker for uploading MusicXML files
  file_picker: ^11.0.2

  # HTTP client for Google Cloud Storage downloads
  http: ^1.3.0

  # Local persistent storage
  shared_preferences: ^2.3.4
  drift: ^2.14.0
  sqlite3_flutter_libs: ^0.5.18
  sqlite3: ^2.4.3
  path: ^1.9.0

  # Path utilities
  path_provider: ^2.1.5

  # State management
  provider: ^6.1.2

  # UUID generation
  uuid: ^4.5.1

  # Microphone audio stream for pitch detection
  record: ^6.2.0

  # FFT for pitch detection
  fftea: ^1.3.0
  
  # Audio playback for notes and metronome
  audioplayers: ^6.1.0

  # QR code rendering for share/download screen
  qr_flutter: ^4.1.0

  # Open URLs in browser / external apps
  url_launcher: ^6.3.1

  # PDF generation and printing
  pdf: ^3.12.0
  printing: ^5.14.3

  # Google Fonts for music notation
  google_fonts: ^6.2.1

  # Icons
  cupertino_icons: ^1.0.8
  web: ^1.1.1
  in_app_purchase: ^3.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.14.0
  build_runner: ^2.4.7
  names_launcher: ^0.0.2
  yaml: ^3.1.2

names_launcher:
  name: "Fun Sheet Music"

flutter:
  uses-material-design: true
  assets:
    - assets/music/defaults/
    - assets/music/defaults/auto-add/
    - assets/music/testing/
    - assets/music/shared_by_users/
    - assets/instruments/
