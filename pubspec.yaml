name: flutter_music
description: A Flutter app for reading MusicXML files, displaying color-coded sheet music for kids, with microphone practice mode.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # XML parsing for MusicXML files
  xml: ^6.5.0

  # File picker for uploading MusicXML files
  file_picker: ^8.1.4

  # HTTP client for Google Cloud Storage downloads
  http: ^1.3.0

  # Local persistent storage
  shared_preferences: ^2.3.4

  # Path utilities
  path_provider: ^2.1.5

  # State management
  provider: ^6.1.2

  # UUID generation
  uuid: ^4.5.1

  # Audio recording / microphone access
  record: ^6.2.0

  # FFT for pitch detection
  fftea: ^1.3.0

  # QR code rendering for share/download screen
  qr_flutter: ^4.1.0

  # Open URLs in browser / external apps
  url_launcher: ^6.3.1

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sample_songs/
