<!DOCTYPE html>
<html lang="en">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="An app for displaying colored sheet music.">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Fun Sheet Music">

  <title>Fun Sheet Music</title>
  <link rel="manifest" href="manifest.json">

  <!-- Required for Drift SQLite on Web -->
  <script src="sql-wasm.js"></script>

  <style>
    body {
      background-color: #ffffff;
      margin: 0;
    }
    .loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 120px;
      height: 120px;
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      border-radius: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      opacity: 1;
      transition: opacity 0.8s ease-in-out;
      pointer-events: none;
    }

    .loader {
      border: 5px solid #f3f3f3;
      border-radius: 50%;
      border-top: 5px solid #1565C0;
      width: 45px;
      height: 45px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    body.flutter-loading {
      overflow: hidden;
    }
  </style>
</head>
<body class="flutter-loading">
  <div id="loading-indicator" class="loading">
    <div class="loader"></div>
  </div>

  <!-- This file is generated by the Flutter tool during build/run.
       The IDE may warn that it cannot resolve it, but it will be served at runtime. -->
  <script src="flutter_bootstrap.js" async></script>

  <script>
    (function() {
      var loadingIndicator = document.getElementById('loading-indicator');
      var isHidden = false;

      function hideLoader() {
        if (isHidden) return;
        isHidden = true;

        // Give the app a moment to render its first frame
        setTimeout(function() {
          if (loadingIndicator) {
            loadingIndicator.style.opacity = '0';
            setTimeout(function() {
              if (loadingIndicator.parentNode) {
                loadingIndicator.remove();
              }
              document.body.classList.remove('flutter-loading');
            }, 800);
          }
        }, 500);
      }

      // Detect when Flutter adds its views to the DOM
      var observer = new MutationObserver(function(mutations) {
        for (var i = 0; i < mutations.length; i++) {
          var nodes = mutations[i].addedNodes;
          for (var j = 0; j < nodes.length; j++) {
            if (nodes[j].tagName && nodes[j].tagName.startsWith('FLT-')) {
              hideLoader();
              observer.disconnect();
              return;
            }
          }
        }
      });

      observer.observe(document.body, { childList: true, subtree: true });

      // Fallback: hide the loader after 15 seconds if nothing happens
      setTimeout(hideLoader, 15000);
    })();
  </script>
</body>
</html>
