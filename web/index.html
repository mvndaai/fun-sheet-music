<!DOCTYPE html>
<html lang="en">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Flutter Music - Color-coded sheet music for kids">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Flutter Music">

  <title>Flutter Music</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      background-color: #ffffff;
      margin: 0;
    }
    .loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 120px;
      height: 120px;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
      border-radius: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      opacity: 1;
      transition: opacity 0.5s ease-out;
      pointer-events: none;
    }

    .loader {
      border: 6px solid #f3f3f3;
      border-radius: 50%;
      border-top: 6px solid #1565C0;
      width: 50px;
      height: 50px;
      -webkit-animation: spin 1s linear infinite;
      animation: spin 1s linear infinite;
    }

    @-webkit-keyframes spin {
      0% { -webkit-transform: rotate(0deg); }
      100% { -webkit-transform: rotate(360deg); }
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    body.flutter-loading {
      overflow: hidden;
    }
  </style>
</head>
<body class="flutter-loading">
  <div id="loading-indicator" class="loading">
    <div class="loader"></div>
  </div>

  <script src="flutter_bootstrap.js" async></script>

  <script>
    (function() {
      var loadingIndicator = document.getElementById('loading-indicator');

      var observer = new MutationObserver(function(mutations) {
        for (var i = 0; i < mutations.length; i++) {
          var addedNodes = mutations[i].addedNodes;
          for (var j = 0; j < addedNodes.length; j++) {
            if (addedNodes[j].tagName && addedNodes[j].tagName.startsWith('FLT-')) {
              hideLoader();
              observer.disconnect();
              return;
            }
          }
        }
      });

      observer.observe(document.body, { childList: true });

      function hideLoader() {
        if (loadingIndicator) {
          loadingIndicator.style.opacity = '0';
          setTimeout(function() {
            if (loadingIndicator.parentNode) {
              loadingIndicator.remove();
            }
            document.body.classList.remove('flutter-loading');
          }, 500);
        }
      }

      // Fallback: hide the loader after 15 seconds
      setTimeout(function() {
        if (document.getElementById('loading-indicator')) {
          console.warn('Flutter loading timeout: removing indicator manually.');
          hideLoader();
        }
      }, 15000);
    })();
  </script>
</body>
</html>
